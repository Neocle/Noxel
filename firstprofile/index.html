<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/firstprofile.css">
        <title>Modifier Profil - Noxel</title>

        <link rel="icon" type="image/png" href="/public/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/public/favicon/favicon.svg" />
        <link rel="shortcut icon" href="/public/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/public/favicon/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Noxel" />
        <link rel="manifest" href="/public/favicon/site.webmanifest" />
    </head>
    <body>
        <div class="container">
            <div class="entete">
                <a class="back-button" href="../signup/index.html">
                    <img class="back-icon" src="../public/icons/back.svg" height="36px">
                </a>

                <h1>S'inscrire.</h1>
            </div>

            <form id="first-profile-form">
                <input type="file" id="image-input" accept="image/*" hidden/>
                <img id="pfp" src="../public/images/default_pfp.jpg" width="128px">
                <button type="button" id="image" onclick="edit()">Modifier</button>

                <label for="username">PSEUDO</label>
                <input type="text" id="username" required>
                
                <button id="finish-button" type="submit">Terminer</button>
            </form>
        </div>
    </body>
    <script src="../js/users.js"></script>    
    <script src="../js/edit-pfp.js"></script>
    <script src="../js/first-edit-profile.js"></script>
</html>
