<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="./css/login.css">
        <title>Se Connecter - Noxel</title>
    </head>
    <body>
        <div class="container">
            <div class="entete">
                <button class="back-button" onclick="back()">
                    <img class="back-icon" src="./public/back.svg" height="36px">
                </button>

                <h1>Se Connecter.</h1>
            </div>

            <form id="login-form" class="login-form">
                <p id="error"></p>
                <label for="username-email">ADDRESSE EMAIL</label>
                <input type="email" id="username-email">
                
                <label for="username-email">MOT DE PASSE</label>
                <input type="password" id="password">

                <div class="checkbox">
                    <input type="checkbox" id="rester-connecte">
                    <label for="rester-connecte">Rester connecté</label>
                </div>

                <button id="login-button" type="submit">Me revoilà!</button>

                <p>Pas de compte? <a href="./signup.html" id="signup-buton">S'inscrire.</a></p>
            </form>
        </div>
    </body>
    <script src="./js/users.js"></script>
    <script src="./js/navigation.js"></script>
    <script src="./js/login.js"></script>
</html>
