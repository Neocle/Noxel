<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="./css/firstprofile.css">
        <title>Modifier Profil - Noxel</title>
    </head>
    <body>
        <div class="container">
            <div class="entete">
                <button class="back-button" onclick="signup()">
                    <img class="back-icon" src="public/back.svg" height="36px">
                </button>

                <h1>Ton Profil</h1>
            </div>

            <form id="first-profile-form">
                <input type="file" id="image-input" accept="image/*" hidden/>
                <img id="pfp" src="./public/default_pfp.jpg" width="128px">
                <button type="button" id="image" onclick="edit()">Modifier</button>

                <label for="username">PSEUDO</label>
                <input type="text" id="username" required>
                
                <button id="finish-button" type="submit">Terminer</button>
            </form>
        </div>
    </body>
    <script src="./js/users.js"></script>    
    <script src="./js/navigation.js"></script>
    <script src="./js/edit-pfp.js"></script>
    <script src="./js/first-edit-profile.js"></script>
</html>
