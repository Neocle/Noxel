<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/newpost.css">
        <title>Nouvelle publication - Noxel</title>

        <link rel="icon" type="image/png" href="/public/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/public/favicon/favicon.svg" />
        <link rel="shortcut icon" href="/public/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/public/favicon/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Noxel" />
        <link rel="manifest" href="/public/favicon/site.webmanifest" />
    </head>
    <body>
        <div class="container">
            <div class="entete">
                <a class="back-button" href="../feed/index.html">
                    <img class="back-icon" src="../public/icons/back.svg" height="36px">
                </a>

                <h1>Nouvelle publication</h1>
            </div>

            <form id="newpost-form" class="newpost-form">
                <p id="error"></p>
                <label for="post-title">TITRE</label>
                <input type="text" id="post-title">
                
                <label for="post-content">CONTENU</label>
                <textarea id="post-description" maxlength="256"></textarea>

                <label for="post-image">IMAGE</label>
                <input type="file" id="post-image" accept="image/*" hidden/>
                <img id="image" width="100%" style="display: none;">
                <button type="button" id="image-add" onclick="addImage()">Ajouter une image</button>
                <button type="button" id="image-remove" onclick="removeImage()" style="display: none;">Retirer l'image</button>

                <button id="post-button" type="submit">Publier</button>
            </form>
        </div>
    </body>
    <script src="../js/users.js"></script>
    <script src="../js/posts.js"></script>
    <script src="../js/newpost.js"></script>
</html>
