<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/signup.css">
        <title>Se Connecter - Noxel</title>

        <link rel="icon" type="image/png" href="/public/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/public/favicon/favicon.svg" />
        <link rel="shortcut icon" href="/public/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/public/favicon/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Noxel" />
        <link rel="manifest" href="/public/favicon/site.webmanifest" />
    </head>
    <body>
        <div class="container">
            <div class="entete">
                <a href="../index.html" class="back-button">
                    <img class="back-icon" src="../public/icons/back.svg" height="36px">
                </a>

                <h1>S'inscrire.</h1>
            </div>

            <form id="signup-form" class="login-form">
                <p id="error"></p>

                <div class="nom-prenom">
                    <div class="name">
                        <label for="name">NOM</label>
                        <input type="text" id="name">      
                    </div>

                    <div class="surname">
                        <label for="surname">PRÉNOM</label>
                        <input type="text" id="surname">
                    </div>
                </div>
                <label for="username-email">ADDRESSE EMAIL</label>
                <input type="email" id="username-email">
                
                <label for="password">MOT DE PASSE</label>
                <input type="password" id="password">

                <label for="confirme-password">CONFIRMER MOT DE PASSE</label>
                <input type="password" id="confirme-password">

                <div class="checkbox">
                    <input type="checkbox" id="rester-connecte">
                    <label for="rester-connecte">Rester connecté</label>
                </div>

                <button id="login-button" type="submit">Suivant</button>

                <p>Déja inscrit? <a href="../login.html" id="signup-buton">Se connecter</a></p>
            </form>
        </div>
    </body>
    <script src="../js/users.js"></script>
    <script src="../js/signup.js"></script>
</html>
